<!DOCTYPE html>
<html>
  <head>
    <title>Qrcky AR - Pure Location Build</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.js"></script>

    <style>
      #debug-ui {
        position: fixed; top: 10px; left: 10px; z-index: 999;
        color: #00ff00; background: rgba(0,0,0,0.8); padding: 10px;
        font-family: monospace; font-size: 11px; pointer-events: none;
      }
      #start-btn {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        z-index: 1000; padding: 15px 40px; background: #00ff00; color: black;
        border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="debug-ui">System: Standby. Tap Start.</div>
    <button id="start-btn">INITIALIZE AR</button>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      renderer="colorManagement: true; exposure: 1.5;"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="sculpture" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-camera gps-new-camera="gpsMinDistance: 1;"></a-camera>

      <a-entity light="type: ambient; intensity: 2.0;"></a-entity>
      <a-entity light="type: directional; intensity: 1.0;" position="1 2 1"></a-entity>

      <a-entity 
        id="sculpture-anchor"
        gltf-model="#sculpture"
        scale="1 1 1"
        visible="false">
      </a-entity>

    </a-scene>

    <script>
      const debug = document.getElementById('debug-ui');
      const startBtn = document.getElementById('start-btn');
      const model = document.querySelector('#sculpture-anchor');
      
      const testMode = true; // Still set to true for your local test
      const gardenLat = 38.344935;
      const gardenLon = -76.452228;

      startBtn.onclick = () => {
        startBtn.style.display = 'none';
        debug.innerText = "Connecting to Satellites...";
        
        // This build uses the 'gps-new-camera' component logic
        window.addEventListener('gps-camera-update-position', (e) => {
          const { latitude, longitude } = e.detail.position;
          const accuracy = e.detail.position.accuracy || 0;
          
          debug.innerText = `Acc: ${accuracy.toFixed(1)}m\nLat: ${latitude.toFixed(5)}\nMode: ${testMode ? 'Testing' : 'Garden'}`;

          model.setAttribute('visible', 'true');
          
          if (testMode) {
            // Drops it slightly North of your current neighbors-yard spot
            const offsetLat = latitude + 0.00005;
            model.setAttribute('gps-new-entity-place', `latitude: ${offsetLat}; longitude: ${longitude};`);
          } else {
            model.setAttribute('gps-new-entity-place', `latitude: ${gardenLat}; longitude: ${gardenLon};`);
          }
        });
      };

      // Ensure model transparency/depth is handled for the baked stripes
      model.addEventListener('model-loaded', () => {
        const mesh = model.getObject3D('mesh');
        mesh.traverse(node => {
          if (node.isMesh) {
            node.material.depthWrite = true;
          }
        });
      });
    </script>
  </body>
</html>
