<!DOCTYPE html>
<html>
  <head>
    <title>Qrcky AR - Studio Debug</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.js"></script>

    <style>
      /* FORCE everything behind the A-Frame canvas to be visible */
      html, body { background-color: transparent !important; margin: 0; overflow: hidden; }
      
      /* Force the webcam video to the bottom layer */
      canvas.a-canvas { z-index: 2; }
      video#arjs-video { position: fixed; top: 0; left: 0; z-index: 1; }

      #debug-ui {
        position: fixed; top: 10px; left: 10px; z-index: 999;
        color: #00ff00; background: rgba(0,0,0,0.8); padding: 10px;
        font-family: monospace; font-size: 11px; pointer-events: none;
        border: 1px solid #00ff00;
      }
      #start-btn {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        z-index: 1000; padding: 15px 30px; background: #00ff00; color: black;
        border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="debug-ui">MODE: Waiting...</div>
    <button id="start-btn">INITIALIZE STUDIO MODE</button>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      renderer="colorManagement: true; alpha: true; antialias: true;"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      background="transparent: true">
      
      <a-assets>
        <a-asset-item id="sculpture" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 3"></a-entity>

      <a-camera id="cam" gps-new-camera="gpsMinDistance: 1;" look-controls></a-camera>

      <a-entity 
        id="sculpture-anchor"
        gltf-model="#sculpture"
        scale="1 1 1"
        visible="false">
      </a-entity>

    </a-scene>

    <script>
      /* ==========================================
         TOGGLE THIS FOR TESTING:
         true  = See it in your room right now (No GPS)
         false = Lock to the Garden (Requires GPS)
         ========================================== */
      const DEVELOPMENT_MODE = true; 

      const debug = document.getElementById('debug-ui');
      const startBtn = document.getElementById('start-btn');
      const model = document.querySelector('#sculpture-anchor');
      
      startBtn.onclick = async () => {
        try {
          // Trigger camera permission
          await navigator.mediaDevices.getUserMedia({ video: true });
          startBtn.style.display = 'none';

          if (DEVELOPMENT_MODE) {
            debug.innerText = "MODE: STUDIO (Indoor)\nModel placed 3m ahead.";
            model.setAttribute('visible', 'true');
            // Simply place the model 3 meters in front of where the camera starts
            model.setAttribute('position', '0 0 -3'); 
          } else {
            debug.innerText = "MODE: GARDEN (GPS)\nSearching for satellites...";
            setupGPS();
          }
        } catch (err) {
          debug.innerText = "Error: Camera Access Denied.";
        }
      };

      function setupGPS() {
        window.addEventListener('gps-camera-update-position', (e) => {
          const { latitude, longitude, accuracy } = e.detail.position;
          debug.innerText = `GPS Acc: ${accuracy.toFixed(1)}m\nLat: ${latitude.toFixed(5)}\nStatus: LIVE`;
          
          model.setAttribute('visible', 'true');
          model.setAttribute('gps-new-entity-place', {
            latitude: 38.344935, 
            longitude: -76.452228
          });
        });
      }

      model.addEventListener('model-loaded', () => {
        const mesh = model.getObject3D('mesh');
        if (mesh) {
          mesh.traverse(node => {
            if (node.isMesh) {
              node.material.depthWrite = true;
              node.material.transparent = false;
            }
          });
        }
      });
    </script>
  </body>
</html>
