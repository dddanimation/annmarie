<!DOCTYPE html>
<html>
  <head>
    <title>Qrcky AR - High-Vis GPS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      /* CRITICAL: Force the white background to be transparent */
      body, html { background-color: transparent; margin: 0; overflow: hidden; }
      #debug-ui {
        position: fixed; top: 10px; left: 10px; z-index: 999;
        color: #00ff00; background: rgba(0,0,0,0.8); padding: 10px;
        font-family: monospace; font-size: 11px; pointer-events: none;
      }
      /* Ensure the camera feed stays behind the AR */
      .a-canvas { z-index: 2; }
      video { z-index: 1; }
    </style>
  </head>

  <body>
    <div id="debug-ui">TAP SCREEN TO START GPS</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="alpha: true; colorManagement: true; exposure: 1.5;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
      background="transparent: true">
      
      <a-assets>
        <a-asset-item id="sculpture" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 2.0;"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

      <a-camera gps-camera rotation-reader></a-camera>

      <a-entity 
        id="model-anchor"
        gltf-model="#sculpture"
        scale="3 3 3"
        visible="false">
      </a-entity>

    </a-scene>

    <script>
      const debug = document.getElementById('debug-ui');
      const model = document.querySelector('#model-anchor');
      
      const testMode = true; // Still TRUE for local testing
      const gardenLat = 38.344935;
      const gardenLon = -76.452228;

      // Click anywhere to trigger the GPS and Camera permissions
      window.onclick = () => {
        debug.innerText = "Locating...";
        
        navigator.geolocation.watchPosition((pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          debug.innerText = `Acc: ${accuracy.toFixed(1)}m\nLat: ${latitude.toFixed(5)}`;

          if (accuracy < 80) {
            model.setAttribute('visible', 'true');
            
            if (testMode) {
              // 5 meters North of your current spot
              const offsetLat = latitude + 0.00005;
              model.setAttribute('gps-entity-place', `latitude: ${offsetLat}; longitude: ${longitude};`);
            } else {
              model.setAttribute('gps-entity-place', `latitude: ${gardenLat}; longitude: ${gardenLon};`);
            }
          }
        }, (err) => {
          debug.innerText = "GPS Error: " + err.message;
        }, { enableHighAccuracy: true });
      };

      model.addEventListener('model-loaded', () => {
        console.log("anne_m loaded");
      });
    </script>
  </body>
</html>
