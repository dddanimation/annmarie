<!DOCTYPE html>
<html>
  <head>
    <title>Qrcky AR - Step 2 (Model Test)</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="alpha: true; colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="sculpture" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>

      <a-entity 
        id="model-anchor"
        gltf-model="#sculpture" 
        position="0 0 -3" 
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>
      
      <a-camera-static></a-camera-static>
    </a-scene>
  </body>
</html>
