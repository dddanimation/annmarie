<!DOCTYPE html>
<html>
  <head>
    <title>Annmarie Residency - anne_m (Baked)</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      renderer="logarithmicDepthBuffer: true; colorManagement: true; exposure: 1.2;"
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-entity light="type: ambient; intensity: 2.0;"></a-entity>
      <a-entity light="type: directional; intensity: 1.0;" position="1 2 1"></a-entity>

      <a-camera gps-new-camera="gpsMinDistance: 1;" rotation-reader></a-camera>

      <a-assets>
        <a-asset-item id="sculpture-model" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        id="sculpture-anchor"
        gltf-model="#sculpture-model"
        scale="1 1 1" 
        rotation="0 0 0">
      </a-entity>

    </a-scene>

    <script>
      const testMode = true; // Still true so you can see it 400ft from home
      const gardenLat = 38.344935;
      const gardenLon = -76.452228;
      
      let lastLat = null;
      let lastLon = null;
      const smoothingFactor = 0.05;

      window.onload = () => {
        const model = document.querySelector('#sculpture-anchor');

        navigator.geolocation.watchPosition((pos) => {
          const coords = pos.coords;
          if (coords.accuracy < 25) {
            if (testMode) {
              const offsetLat = coords.latitude + 0.00005; 
              model.setAttribute('gps-new-entity-place', `latitude: ${offsetLat}; longitude: ${coords.longitude};`);
            } else {
              if (lastLat === null) {
                lastLat = coords.latitude;
                lastLon = coords.longitude;
              } else {
                lastLat = (lastLat * (1 - smoothingFactor)) + (coords.latitude * smoothingFactor);
                lastLon = (lastLon * (1 - smoothingFactor)) + (coords.longitude * smoothingFactor);
              }
              model.setAttribute('gps-new-entity-place', `latitude: ${gardenLat}; longitude: ${gardenLon};`);
            }
          }
        }, (err) => console.error(err), { enableHighAccuracy: true });
      };
    </script>
  </body>
</html>
