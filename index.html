<!DOCTYPE html>
<html>
  <head>
    <title>Annmarie Residency - Geo AR (anne_m)</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-camera 
        gps-new-camera="gpsMinDistance: 1;" 
        rotation-reader>
      </a-camera>

      <a-assets>
        <a-asset-item id="sculpture-model" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        id="sculpture-anchor"
        gltf-model="#sculpture-model"
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>

    </a-scene>

    <script>
      // CONFIGURATION
      const gardenLat = 38.344935;
      const gardenLon = -76.452228;
      const testMode = true; // Set to FALSE when you are ready to go live at the garden
      
      let lastLat = null;
      let lastLon = null;
      const smoothingFactor = 0.05; // Lower is smoother/heavier; Higher is more responsive

      window.onload = () => {
        const model = document.querySelector('#sculpture-anchor');

        navigator.geolocation.watchPosition((pos) => {
          const coords = pos.coords;
          
          // Only update if accuracy is decent (under 20 meters)
          if (coords.accuracy < 20) {
            
            if (testMode) {
              // TEST MODE: Place it 5 meters North of wherever you are standing NOW
              const offsetLat = coords.latitude + 0.00005; 
              model.setAttribute('gps-new-entity-place', `latitude: ${offsetLat}; longitude: ${coords.longitude};`);
              console.log("Testing nearby...");
            } else {
              // GARDEN MODE: Smoothing logic for the final site
              if (lastLat === null) {
                lastLat = coords.latitude;
                lastLon = coords.longitude;
              } else {
                lastLat = (lastLat * (1 - smoothingFactor)) + (coords.latitude * smoothingFactor);
                lastLon = (lastLon * (1 - smoothingFactor)) + (coords.longitude * smoothingFactor);
              }
              model.setAttribute('gps-new-entity-place', `latitude: ${gardenLat}; longitude: ${gardenLon};`);
              console.log("Garden Location Locked.");
            }
          }
        }, (err) => {
          console.error("GPS Error:", err);
          alert("Please enable high-accuracy GPS and refresh.");
