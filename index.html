<!DOCTYPE html>
<html>
  <head>
    <title>Preview: anne_m Sculpture</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-camera 
        gps-new-camera="simulateLatitude: 38.344935; simulateLongitude: -76.452228" 
        rotation-reader>
      </a-camera>

      <a-assets>
        <a-asset-item id="sculpture-model" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        id="preview-sculpture"
        gps-new-entity-place="latitude: 38.344940; longitude: -76.452228;"
        gltf-model="#sculpture-model"
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>

    </a-scene>
  </body>
</html>
