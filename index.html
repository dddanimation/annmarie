<!DOCTYPE html>
<html>
  <head>
    <title>Live Preview: anne_m</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      vr-mode-ui="enabled: false"
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-camera gps-new-camera rotation-reader></a-camera>

      <a-assets>
        <a-asset-item id="sculpture" src="anne_m.glb"></a-asset-item>
      </a-assets>

      <a-entity id="model-anchor" gltf-model="#sculpture" scale="1 1 1"></a-entity>
    </a-scene>

    <script>
      window.onload = () => {
        navigator.geolocation.getCurrentPosition((position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          
          // Place the model about 5 meters (~15 feet) North of you
          const offsetLat = lat + 0.00005; 
          
          const anchor = document.querySelector('#model-anchor');
          anchor.setAttribute('gps-new-entity-place', `latitude: ${offsetLat}; longitude: ${lon};`);
          
          console.log(`Model placed at: ${offsetLat}, ${lon}`);
        });
      };
    </script>
  </body>
</html>
